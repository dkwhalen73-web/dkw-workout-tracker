<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dr. Gains North Star v15</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header class="header">
    <div class="stars">
      <div class="h-row">
        <div>
          <div class="h-title" id="hTitle">Dr. Gains North Star</div>
          <div class="h-meta" id="hMeta">Loading workout...</div>
        </div>
        <div class="sets-num" id="setsDone">0 / 0</div>
      </div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="pFill"></div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" id="t-load" onclick="switchTab('load')">⊕ LOAD</button>
    <button class="tab-btn" id="t-overview" onclick="switchTab('overview')">◼ OVERVIEW</button>
    <button class="tab-btn" id="t-workout" onclick="switchTab('workout')">💪 WORKOUT</button>
  </div>

  <div class="tab-pane active" id="p-load">
    <div class="card">
      <div class="card-title">Session Controls</div>
      <div class="btn-row" style="display:flex; flex-direction:column; gap:8px">
        <div style="display:flex; gap:8px">
          <button class="btn btn-primary" style="flex:2" onclick="forceReloadWorkout()">↻ Reload Latest Workout</button>
          <button class="btn btn-secondary" style="flex:1" onclick="hardRefresh()">★ Hard Reload</button>
        </div>
        <div style="display:flex; gap:8px">
          <button class="btn btn-secondary" style="flex:1" onclick="resumeSession()">Resume Session</button>
          <button class="btn btn-danger" style="flex:1" onclick="clearSession()">Clear All Data</button>
        </div>
        <div style="display:flex; gap:8px">
          <button class="btn btn-secondary" style="flex:1" onclick="validateRepoData()">Validate Data</button>
        </div>
      </div>
      <div class="hint" style="margin-top:12px" id="builderStatus"></div>
    </div>
    <div class="card" style="border-top:1px solid rgba(248,246,240,0.1)">
      <div class="card-title">Program Builder</div>
      <div class="hint">Select your session from the 8-week protocol.</div>
      
      <div class="selector-grid">
        <div class="sel-group" style="grid-column: span 2">
          <label class="sel-label">Training Mode</label>
          <select id="sel-mode" class="sel-input" onchange="APP.config.mode = this.value; updateBuilderUI()">
            <option value="standard">Standard 8-Week Program</option>
            <option value="travel">Travel / Crunch / Hotel</option>
            <option value="beast">Beast Mode (Sat/Sun)</option>
            <option value="murph">Murph Prep</option>
          </select>
        </div>

        <div class="sel-group" id="group-week">
          <label class="sel-label">Week</label>
          <select id="sel-week" class="sel-input" onchange="APP.config.week = this.value">
            <option value="1">Week 1</option>
            <option value="2">Week 2</option>
            <option value="3">Week 3</option>
            <option value="4">Week 4</option>
            <option value="5">Week 5</option>
            <option value="6">Week 6</option>
            <option value="7">Week 7</option>
            <option value="8">Week 8</option>
          </select>
        </div>

        <div class="sel-group" id="group-day">
          <label class="sel-label">Day</label>
          <select id="sel-day" class="sel-input" onchange="APP.config.day = this.value">
            <option value="Monday">Monday</option>
            <option value="Wednesday">Wednesday</option>
            <option value="Friday">Friday</option>
            <option value="Saturday">Saturday</option>
          </select>
        </div>

        <div class="sel-group" style="grid-column: span 2">
          <label class="sel-label">Location / Equipment</label>
          <select id="sel-location" class="sel-input" onchange="APP.config.location = this.value">
            <option value="WFWHF">Main Gym (WFWHF)</option>
            <option value="Crunch">Crunch Fitness (Swaps)</option>
            <option value="Hotel">Hotel / Minimal (Swaps)</option>
          </select>
        </div>
      </div>

      <div class="btn-row" style="margin-top:20px">
        <button class="btn btn-primary" style="width:100%" onclick="buildWorkout()">★ BUILD WORKOUT</button>
      </div>
    </div>

    <div class="card" style="border-top:1px solid rgba(248,246,240,0.1)">
      <div class="card-title">Manual Load (Backup)</div>
      <div class="hint" style="margin-bottom:10px">Paste tracker JSON from Claude if auto-load isn't working.</div>
      <textarea class="text-area" id="loadInput" placeholder="Paste tracker JSON here..."></textarea>
      <div class="btn-row" style="margin-top:12px">
        <button class="btn btn-secondary" onclick="loadFromJson()">Load Pasted JSON</button>
      </div>
    </div>
  </div>

  <div class="tab-pane" id="p-overview">
    <div id="overviewContent"></div>
  </div>
  <div class="tab-pane" id="p-workout">
    <div id="workoutContent"></div>
  </div>

  <div class="rest-pill" id="restPill">REST <span id="restVal">60</span>s <button class="rest-close"
      onclick="stopRest()">✕</button></div>

  <div class="finish-btn" id="finishWrap">
    <button class="btn btn-primary" onclick="finishSession()">★ Complete Session</button>
  </div>

  <div class="modal-overlay" id="logModal">
    <div class="modal">
      <div class="modal-head">Session Log</div>
      <div class="modal-body" id="logBody"></div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="copyLog()">Copy Log</button>
        <button class="btn btn-secondary" onclick="closeModal()">Done</button>
      </div>
    </div>
  </div>

  <script src="parsed_db.js"></script>
  <script src="app.js"></script>
</body>

</html>
